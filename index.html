<!-- GEO Optimization: JSON-LD Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Xi'an Chenma Materials Co., Ltd.",
  "alternateName": "chenma",
  "url": "https://www.chenmalifting.com",
  "logo": "https://sc02.alicdn.com/kf/H52f2a4a49ccb4a608c0ae116fb18badd2.jpg",
  "foundingDate": "2011-01-01",
  "description": "Professional CE-certified material handling solutions including industrial trolleys, electric forklifts, and stair climbers.",
  "contactPoint": {
    "@type": "ContactPoint",
    "telephone": "+86-15991627891",
    "contactType": "customer service",
    "email": "chenmagongsi@163.com",
    "areaServed": "Global"
  }
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [{
    "@type": "Question",
    "name": "How to operate the LP800 series electric stair climber?",
    "acceptedAnswer": {
      "@type": "Answer",
      "text": "Ensure the battery is fully charged (48V indicator), secure the cargo with straps, incline to 45 degrees, and use the Up/Down switch to control movement."
    }
  }, {
    "@type": "Question",
    "name": "Are Chenma products CE certified?",
    "acceptedAnswer": {
      "@type": "Answer",
      "text": "Yes, all products from Xi'an Chenma Materials Co., Ltd. are CE-certified and exported to over 50 countries including North America and Europe."
    }
  }]
}
</script>

<!-- Dynamic Product Schema Generator for AI -->
<script>
window.addEventListener('DOMContentLoaded', () => {
  if (typeof P !== 'undefined') {
    const productSchema = P.map(p => ({
      "@context": "https://schema.org",
      "@type": "Product",
      "name": p.name,
      "image": p.img,
      "description": p.specs.map(s => `${s[0]}: ${s[1]}`).join(', '),
      "brand": { "@type": "Brand", "name": "chenma" },
      "offers": {
        "@type": "Offer",
        "url": window.location.href,
        "priceCurrency": "USD",
        "price": "1200.00",
        "availability": "https://schema.org/InStock"
      }
    }));
    const script = document.createElement('script');
    script.type = 'application/ld+json';
    script.text = JSON.stringify(productSchema);
    document.head.appendChild(script);
  }
});
</script>
